<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center</title>
    <link rel="stylesheet" href="../src/css/bootstrap.css">
    <link rel="stylesheet" href="../src/css/loaders.css">
    <script src="../src/css/tailwind.css"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="../src/js/calendar.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:#f3f4f6}

        .sidebar{width:230px;background:#111827;height:100vh;position:fixed;left:0;top:0;z-index:50;display:flex;flex-direction:column;transition:transform .3s}
        .sidebar-logo{padding:18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1f2937}
        .sidebar-logo img{width:34px;height:34px;border-radius:8px;object-fit:cover}
        .sidebar-logo h2{color:#f9fafb;font-size:.95rem;font-weight:600}
        .sidebar nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
        .nav-btn{width:100%;text-align:left;padding:9px 12px;border:none;background:none;color:#9ca3af;font-size:.82rem;font-family:inherit;font-weight:500;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s,color .15s}
        .nav-btn:hover{background:#1f2937;color:#e5e7eb}
        .nav-btn.active{background:#059669;color:#fff}
        .nav-btn i{width:18px;text-align:center;font-size:.8rem}

        .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
        .overlay.show{display:block}

        .main{margin-left:230px;min-height:100vh;display:flex;flex-direction:column}
        .topbar{height:52px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:30}
        .topbar-left{display:flex;align-items:center;gap:10px}
        .menu-btn{display:none;width:32px;height:32px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;cursor:pointer;color:#6b7280;font-size:.85rem;align-items:center;justify-content:center}
        .topbar h1{font-size:.95rem;font-weight:600;color:#111827}
        .topbar-right{display:flex;gap:6px}
        .icon-btn{width:32px;height:32px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;cursor:pointer;color:#6b7280;font-size:.78rem;display:flex;align-items:center;justify-content:center;position:relative}
        .icon-btn .dot{position:absolute;top:5px;right:5px;width:6px;height:6px;background:#ef4444;border-radius:50%}

        .content{flex:1;padding:16px;overflow-x:hidden}
        #admin_dashboard{animation:fadeIn .2s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

        /* Anything injected gets these base styles */
        #admin_dashboard>div{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
        #admin_dashboard table{width:100%;border-collapse:collapse;min-width:480px}
        #admin_dashboard table th,#admin_dashboard table td{padding:8px 10px;text-align:left;font-size:.78rem;border-bottom:1px solid #e5e7eb;white-space:nowrap}
        #admin_dashboard table th{background:#f9fafb;color:#6b7280;font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.03em}

        .loader2{width:30px;aspect-ratio:1;display:grid;border:3px solid #0000;border-radius:50%;border-color:#e5e7eb #0000;animation:l16 1s infinite linear}
        .loader2::before,.loader2::after{content:"";grid-area:1/1;margin:2px;border:inherit;border-radius:50%}
        .loader2::before{border-color:#059669 #0000;animation:inherit;animation-duration:.5s;animation-direction:reverse}
        .loader2::after{margin:5px}
        @keyframes l16{100%{transform:rotate(1turn)}}

        @media(max-width:768px){
            .sidebar{transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .main{margin-left:0}
            .menu-btn{display:flex}
            .content{padding:10px}
            #admin_dashboard>div{padding:12px;margin-bottom:10px}
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="flex items-center gap-3 p-5 border-b border-gray-800/80">
    <img src="assets/logo.png" alt="Logo" class="w-10 h-10 rounded-xl object-cover ring-1 ring-white/10 shadow-sm">
    <div>
        <h2 class="text-sm font-bold text-white tracking-tight">Control Center</h2>
        <p class="text-[0.65rem] text-gray-500 font-medium uppercase tracking-widest mt-0.5">Admin Portal</p>
    </div>
</div>
    <nav>
        <button class="nav-btn active" data-i="0" onclick="Run(0)"><i class="fa-solid fa-table-columns"></i>Dashboard</button>
        <button class="nav-btn" data-i="1" onclick="Run(1)"><i class="fa-solid fa-upload"></i>Upload Results</button>
        <button class="nav-btn" data-i="2" onclick="Run(2)"><i class="fa-solid fa-user-plus"></i>Add Student</button>
        <button class="nav-btn" data-i="3" onclick="Run(3)"><i class="fa-solid fa-bell"></i>Notifications</button>
        <button class="nav-btn" data-i="4" onclick="Run(4)"><i class="fa-solid fa-book"></i>Library</button>
        <button class="nav-btn" data-i="5" onclick="Run('5')"><i class="fa-solid fa-gear"></i>Settings</button>
        <button class="nav-btn text-red-500 font-bold flex items-center gap-2 hover:text-red-700 transition" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>LOGOUT</span>
        </button>
    </nav>
</aside>

<div class="main">
    <header class="topbar">
        <div class="topbar-left">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <h1 id="pageTitle">Dashboard </h1>

            <p class="inline-flex items-center gap-2 text-xs font-medium text-gray-500 bg-gray-50 border border-gray-200/70 px-3 py-1.5 rounded-full">
                <i class="fa-solid fa-shield-halved text-blue-500 text-[0.65rem]"></i>
                Admin: <span id="logged" class="font-semibold text-gray-800"></span>
            </p>

        </div>
        <div class="flex items-center gap-3">

    <!-- Search -->
    <button class="w-auto h-9 flex items-center justify-center rounded-lg border border-slate-200 bg-white hover:bg-slate-50">
        <i class="fa-solid fa-magnifying-glass text-slate-600 p-4"></i>
        <input 
                type="text" 
                id="SEARCH_STUDENT" 
                onkeyup="dashboard_data('search',this.value)" 
                placeholder="Search student..."
                class="w-full pl-2 pr-4 py-2.5 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500/30 focus:outline-none text-sm bg-white shadow-sm"
            >

    </button>

    <!-- Notifications -->
    <button onclick="read_total_messages_from_students(1)" class="relative w-9 h-9 flex items-center justify-center rounded-lg border border-slate-200 bg-white hover:bg-slate-50">
        <i class="fa-solid fa-bell text-slate-600"></i>

        <!-- Badge -->
        <span id='inbox_msg' class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">
            0
        </span>
    </button>

</div>
    </header>
    <section id='content' class="content">
        <div id="admin_dashboard">
            <div style="display:flex;align-items:center;justify-content:center;padding:40px 20px;flex-direction:column;gap:10px">
                <div class="loader2"></div>
                <p style="color:#9ca3af;font-size:.78rem">Loading...</p>
            </div>
        </div>
    </section>
</div>


<script src="Admin_Config.js" defer></script>
<script src="cards/dashboard_card.js" defer></script>
<script src="cards/settings_card.js" defer></script>
<script src="cards/notice_card.js" defer></script>
<script src="cards/library_card.js" defer></script>
<script src="cards/results_card.js" defer></script>
<script src="cards/add_student_card.js" defer></script>

<script>
    var titles={0:'Dashboard',1:'Upload Results',2:'Add Student',3:'Notifications',4:'Library',5:'Settings'};

    function toggleSidebar(){
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }
    function closeSidebar(){
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }
    function Run(data) {

    // Active button
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.i == data);
    });

    // Title
    document.getElementById('pageTitle').textContent =
        titles[data] || 'Dashboard';

    let content = dashboard;

    if (data == 1) {
        content = upload_results;
        localStorage.setItem('card',data);

    } else if (data == 2) {
        content = add_student;
        localStorage.setItem('card',data);

    } else if (data == 3) {
        content = notification;
        localStorage.setItem('card',data);
        note();

    } else if (data == 4) {
        content = library;
        localStorage.setItem('card',data);

        setTimeout(() => {
            if (typeof show === 'function') show();
        }, 100);

    } else if (data == 5) {
        content = settings;
        localStorage.setItem('card',data);

        setTimeout(()=>{
    supabaseClient
        .from('system_settings')
        .select('exam, apply')
        .single()
        .then(({ data, error }) => {

            if (error) {
                //callback
                return;
            }

            document.getElementById('toggleExamReg').checked = data.exam;
            document.getElementById('toggleCandidateApp').checked = data.apply;
        });
},20);

        if (typeof showCAL === 'function') showCAL();

    } else {

        setTimeout(() => {
            if (typeof dashboard_data === 'function') dashboard_data();
            if (typeof show_books === 'function') show_books();
            if (typeof universal === 'function') universal();
        }, 100);
    }

    const el = document.getElementById('admin_dashboard');

    // Restart animation
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';

    // Load content
    el.innerHTML = content || `
        <div style="padding:40px;text-align:center;color:#9ca3af">
            Section not available
        </div>
    `;

    // Mobile
    if (window.innerWidth <= 768) {
        closeSidebar();
    }
}
window.onload = async function () {

    const { data: { user } } =
        await supabaseClient.auth.getUser();

    if (!user) {
        location.href = "Admin_Login.html";
        return;
    }

    // user exists here
    await logged_user(user.id);
    let selected_card = localStorage.getItem('card');
    if(selected_card){
        Run(selected_card);
    }else{
        Run(0);
    }
};

async function logged_user(key) {
    const { data, error } = await supabaseClient
        .from('Administrators')
        .select('*')
        .eq('uuid', key)
        .single();

    if (error) {
        console.error(error);
        return;
    }

    document.getElementById("logged").innerHTML=data.display_name;
}

    async function logout() {
       //add a loader when logging out

            const loader = document.createElement("div");
            loader.id = "global-loader";
            loader.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0,0,0,0.3);
                z-index: 9999;
            `;
            
            loader.innerHTML = `
                <div class="loader2 h-[100px] w-[100px]"></div>
            `;
            
            document.body.appendChild(loader);

        //logout
    await supabaseClient.auth.signOut();

    location.href = "index.html";

}

</script>
</body>
</html>
