    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #93C5FD; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #60A5FA; }

        /* Sidebar active indicator */
        .sidebar-btn { position: relative; }
        .sidebar-btn::before {
            content: '';
            position: absolute;
            left: 0; top: 6px; bottom: 6px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: #3B82F6;
            transform: scaleY(0);
            transition: transform 0.2s ease;
        }
        .sidebar-btn:hover::before,
        .sidebar-btn.active::before { transform: scaleY(1); }

        /* Card lift on hover */
        .card-lift { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-lift:hover { transform: translateY(-3px); box-shadow: 0 16px 40px -8px rgba(59,130,246,0.2); }

        /* Program chip hover */
        .program-chip { transition: all 0.2s ease; }
        .program-chip:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px -2px rgba(59,130,246,0.25);
        }

        /* Image subtle overlay */
        .img-overlay { position: relative; }
        .img-overlay::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(59,130,246,0.1) 0%, transparent 50%);
            border-radius: inherit;
            pointer-events: none;
        }

        /* Header gradient line */
        .header-line {
            background: linear-gradient(90deg, #3B82F6, #6366F1, #8B5CF6, #3B82F6);
            height: 2px;
        }

        /* Glow dot */
        .glow-dot {
            box-shadow: 0 0 8px rgba(59,130,246,0.6);
        }

        /* Certification card shine */
        .cert-card { position: relative; overflow: hidden; }
        .cert-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        .cert-card:hover::before { opacity: 1; }

        /* Subtle animated BG shimmer (CSS only) */
        .bg-shimmer {
            background: linear-gradient(135deg, #EFF6FF 0%, #E0E7FF 25%, #DBEAFE 50%, #E0E7FF 75%, #EFF6FF 100%);
            background-size: 400% 400%;
            animation: shimmer 15s ease infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        input,select,option{
          text-transform: uppercase;
        }

input:invalid:not(:placeholder-shown),
select:invalid{
    border-color:#f43f5e;
    box-shadow:0 0 0 4px rgba(244,63,94,.10);
}

input:valid,
select:valid{
    border-color:#10b981;
    box-shadow:0 0 0 4px rgba(16,185,129,.10);
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}


.skeleton{
    position: relative;
    color: transparent;
    user-select: none;
    overflow: hidden;

    background: #d1d5db;
    border-radius: 8px;
}

/* Silver wiping effect */
.skeleton::after{
    content: "";
    position: absolute;
    top: 0;
    left: -150%;

    width: 100%;
    height: 100%;

    background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.7),
        transparent
    );

    animation: shimmer 1.5s infinite;
}

@keyframes shimmer{
    100%{
        left: 150%;
    }
}


@keyframes blinkBorder {
  0% { box-shadow: 0 0 0 0 #3b82f6; }
  50% { box-shadow: 0 0 0 6px rgba(59,130,246,0.5); }
  100% { box-shadow: 0 0 0 0 transparent; }
}

.blink {
  animation: blinkBorder 0.5s ease-in-out 5;
}





.loader2 {
  width: 50px;
  aspect-ratio: 1;
  display: grid;
  border: 4px solid #0000;
  border-radius: 50%;
  border-color: #ccc #0000;
  animation: l16 1s infinite linear;
}
.loader2::before,
.loader2::after {    
  content: "";
  grid-area: 1/1;
  margin: 2px;
  border: inherit;
  border-radius: 50%;
}
.loader2::before {
  border-color: #3b82f6 #0000;
  animation: inherit; 
  animation-duration: .5s;
  animation-direction: reverse;
}
.loader2::after {
  margin: 8px;
}
@keyframes l16 { 
  100%{transform: rotate(1turn)}
}

#land_card{
    transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
}

<script>

//used to switch images how to add effect e.g zooming effect
function lex() {
    const img = document.getElementById("land_card");

    setInterval(() => {
        img.style.opacity = "0";

        setTimeout(() => {
            const which = Math.floor(Math.random() * 5) + 1;
            img.src = `src/img/gala${which}.jpg`;

            img.onload = () => {
                img.style.opacity = "1";
            };
        }, 800);
    }, 30000);
}
  

function nav(opt){

  const view = document.getElementById("view");

  // show loading first
  view.innerHTML = `
    <div class='grid place-items-center' style=" width:100%; height:100%;">
        <div class='loader2 h-[100px] w-[100px]'></div>
    </div>
  `;

  // delay content rendering slightly
  setTimeout(() => {

    if(opt == "library"){
      view.innerHTML = library;
      loadBooks();

    }else if(opt == "anncmts"){
      view.innerHTML = anncmt ;
      loadNotification(0);

    }else if(opt == "exams"){
      EXAM_REG();

    }else if(opt == "profile"){
      view.innerHTML = profile;
      show_pic();

    }else if(opt == "login"){
      view.innerHTML = logins;

    }else if(opt == "register"){
      view.innerHTML = signup;

    }else if(opt == "apply"){
      APPLY_REG();

    }else if(opt == "student_access"){
      view.innerHTML = access;
      show_pic();
      loadNotification(1);

    }else{
      view.innerHTML = dashboard;
      lex();
    }

  }, 500); // loader shows for 0.5 seconds

}

  function logout(){
    sessionStorage.removeItem('session_token'); 
      document.getElementById('sideNAV').style.display = 'none';
      document.getElementById('bottomNAV').style.display = 'none';
      document.getElementById('Before_links').style.display = '';
      document.getElementById('After_links').style.display = 'none';
    allow();
  }

function view_results() {

    document.querySelectorAll('.wrapper').forEach(el => {
        el.style.display = 'none';
        const tag = document.getElementById('results_section');
            tag.scrollIntoView({ behavior: 'smooth' });
            tag.classList.remove('blink');
            void tag.offsetWidth; // restart animation
            tag.classList.add('blink');
    setTimeout(()=>{
        document.querySelectorAll('.wrapper').forEach(el => {
        el.style.display = 'grid';
    });
    },60000);
    });
}
</script>
